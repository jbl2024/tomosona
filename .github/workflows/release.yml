name: Release (macOS, Linux, Windows)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.build_id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            build_id: macos
            runs-on: macos-latest
          - platform: linux
            build_id: linux-amd64
            runs-on: ubuntu-24.04
          - platform: linux
            build_id: linux-arm64
            runs-on: ubuntu-24.04-arm
          - platform: windows
            build_id: windows
            runs-on: windows-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf

      - name: Cache Tauri bundler tools
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: src-tauri/target/.tauri
          key: tauri-tools-${{ matrix.build_id }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/tauri.conf.json', '.github/workflows/release.yml') }}
          restore-keys: |
            tauri-tools-${{ matrix.build_id }}-

      - name: Install deps
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm ci

      - name: Prefetch AppImage tools
        if: matrix.platform == 'linux'
        run: |
          case "${{ matrix.build_id }}" in
            linux-amd64)
              tool_arch="x86_64"
              linuxdeploy_arch="x86_64"
              ;;
            linux-arm64)
              tool_arch="aarch64"
              linuxdeploy_arch="aarch64"
              ;;
            *)
              echo "Unsupported Linux build id: ${{ matrix.build_id }}"
              exit 1
              ;;
          esac

          tools_dir="src-tauri/target/.tauri"
          mkdir -p "$tools_dir"

          fetch() {
            local url="$1"
            local output="$2"
            if [ -f "$output" ]; then
              return 0
            fi

            curl -fL \
              --retry 5 \
              --retry-delay 5 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 300 \
              -o "$output" \
              "$url"
          }

          fetch "https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-${tool_arch}" \
            "$tools_dir/AppRun-${tool_arch}"
          fetch "https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-${linuxdeploy_arch}.AppImage" \
            "$tools_dir/linuxdeploy-${linuxdeploy_arch}.AppImage"
          fetch "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" \
            "$tools_dir/linuxdeploy-plugin-gtk.sh"
          fetch "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh" \
            "$tools_dir/linuxdeploy-plugin-gstreamer.sh"

          chmod +x \
            "$tools_dir/AppRun-${tool_arch}" \
            "$tools_dir/linuxdeploy-${linuxdeploy_arch}.AppImage" \
            "$tools_dir/linuxdeploy-plugin-gtk.sh" \
            "$tools_dir/linuxdeploy-plugin-gstreamer.sh"

      - name: Build Tauri (Linux)
        if: matrix.platform == 'linux'
        run: npm run tauri build -- --bundles appimage,deb

      - name: Build Tauri (Non-Linux)
        if: matrix.platform != 'linux'
        run: npm run tauri build

      # ⬇️ upload uniquement les vrais bundles
      - name: Upload binaries only
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.build_id }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.appimage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show files
        run: find artifacts -type f

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
          
